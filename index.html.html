<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #05060e;
            color: #f3f4f6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- SCREEN 1: ANIMASI MAWAR TUMBUH (PERSIS DI VIDEO) --- */
        #flower-screen {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            padding: 60px 20px;
            text-align: center;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 99;
            background-color: #05060e;
            transition: opacity 1s ease, visibility 1s;
        }

        .title-area h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: #fbcfe8;
            letter-spacing: 3px;
            margin-bottom: 8px;
            font-weight: 400;
        }

        .title-area p {
            font-size: 11px;
            color: #6b7280;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Struktur Bunga Mawar Tumbuh Minimalis */
        .rose-wrapper {
            position: relative;
            width: 100px;
            height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* Batang Mawar Tegak Lurus Tumbuh dari Bawah */
        .rose-stem {
            width: 2px;
            height: 0px;
            background: linear-gradient(to top, #14532d, #22c55e);
            position: relative;
            animation: growStem 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 0.5s;
        }

        /* Kelopak Kuncup Mawar Merah yang Mekar Seiring Batang Tumbuh */
        .rose-bud {
            width: 34px;
            height: 42px;
            background: linear-gradient(to bottom, #ef4444, #991b1b);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: 0;
            transform: translate(-50%, -100%) scale(0);
            left: 50%;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.4), 0 4px 10px rgba(239, 68, 68, 0.2);
            animation: bloomRose 2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            animation-delay: 2.3s;
        }

        /* Daun Estetik Kecil */
        .rose-leaf {
            width: 14px;
            height: 8px;
            background: #16a34a;
            border-radius: 10px 0 10px 0;
            position: absolute;
            opacity: 0;
            animation: fadeInLeaf 1s ease forwards;
            animation-delay: 2s;
        }
        .rose-leaf.left { left: -13px; top: 60px; transform: rotate(-30deg); }
        .rose-leaf.right { right: -13px; top: 100px; transform: rotate(30deg); }

        /* KEYFRAMES ANIMASI MAWAR */
        @keyframes growStem {
            to { height: 160px; }
        }
        @keyframes bloomRose {
            to { transform: translate(-50%, -100%) scale(1); }
        }
        @keyframes fadeInLeaf {
            to { opacity: 1; }
        }

        /* Tombol Open Letter */
        .open-btn {
            background: transparent;
            border: 1px solid rgba(251, 207, 232, 0.4);
            color: #fbcfe8;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 11px;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.4s ease;
            opacity: 0;
            animation: fadeInBtn 1s ease forwards;
            animation-delay: 3.5s;
        }

        .open-btn:hover {
            background: rgba(251, 207, 232, 0.08);
            border-color: #fbcfe8;
        }

        /* --- SCREEN 2: MAIN CONTENT (LETTER & PHOTO) --- */
        #main-content {
            max-width: 460px;
            margin: 0 auto;
            padding: 50px 20px 100px;
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* Kotak Surat Estetik Glassmorphism */
        .letter-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 28px 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin-bottom: 35px;
        }

        .letter-text {
            font-size: 13.5px;
            line-height: 1.9;
            color: #d1d5db;
            min-height: 120px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* Galeri 2 Foto Sejajar */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            color: #fbcfe8;
            margin-bottom: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 40px;
        }

        .gallery-item {
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 3/4; /* Format potret meninggi biar estetik */
            border: 1px solid rgba(255,255,255,0.04);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Tombol Next */
        .next-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #9ca3af;
            padding: 12px 32px;
            border-radius: 25px;
            font-size: 11px;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.4s ease;
            display: block;
            margin: 0 auto;
        }

        .next-btn:hover {
            border-color: #fbcfe8;
            color: #fbcfe8;
        }

        /* --- SCREEN 3: FINAL PAGE (I LOVE YOU) --- */
        #final-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            background: #05060e;
            z-index: 100;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .love-title {
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 6px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .heart-icon {
            color: #dc2626;
            animation: pulse 1.2s infinite;
            font-size: 40px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); }
        }

        /* Animasi Hujan Hati Rontok Halus */
        .falling-heart {
            position: fixed;
            top: -20px;
            pointer-events: none;
            z-index: 5;
            animation: fall linear forwards;
            color: #f43f5e;
            opacity: 0.6;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        @keyframes fadeInBtn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="lagu.mp3" type="audio/mp3">
    </audio>

    <div id="flower-screen">
        <div class="title-area">
            <h1>Special Gift</h1>
            <p>Press to open the secret letter ✨</p>
        </div>

        <div class="rose-wrapper">
            <div class="rose-stem">
                <div class="rose-bud"></div>
                <div class="rose-leaf left"></div>
                <div class="rose-leaf right"></div>
            </div>
        </div>

        <button class="open-btn" onclick="openLetter()">Open Letter</button>
    </div>

    <div id="main-content">
        <div class="letter-box">
            <div class="letter-text" id="text-target"></div>
        </div>

        <div class="section-title">Our Memories</div>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="foto1.jpg" alt="Foto 1"></div>
            <div class="gallery-item"><img src="foto2.jpg" alt="Foto 2"></div>
        </div>

        <button class="next-btn" onclick="showFinal()">Next —></button>
    </div>

    <div id="final-screen">
        <div class="love-title">
            <span>I</span>
            <span class="heart-icon">❤️</span>
            <span>U</span>
        </div>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        const textContainer = document.getElementById('text-target');
        
        // Teks ketikan otomatis persis kayak di video
        const messageText = "Thank you for being such a strong and amazing person. I'm really proud of you. You've done so well until this very moment, chasing your dreams and fighting your own battles with grace. You always keep trying to stay on your own path and pursue what matters most. You never give up, even when deep down you're actually so tired.\n\nI truly believe that one day, you'll look back at all of this and smile proudly because you made it through every hard moment and every part of the process.\n\nNever forget to be grateful for how far you've come, and keep moving forward with a happy heart. May your days be filled with beautiful blessings and endless joy. Keep shining, beautiful souls...🤍";

        let index = 0;

        function openLetter() {
            // Putar musik instrumen piano pas tombol di klik
            music.play().catch(err => console.log("Autoplay ditolak browser lokal"));

            // Sembunyikan Halaman Mawar secara halus
            const flowerScreen = document.getElementById('flower-screen');
            flowerScreen.style.opacity = '0';
            flowerScreen.style.visibility = 'hidden';

            // Munculkan Halaman Utama Surat & Foto
            const mainContent = document.getElementById('main-content');
            mainContent.style.display = 'block';
            setTimeout(() => {
                mainContent.style.opacity = '1';
                typeWriter(); // Mulai jalankan efek ngetik mesin tik
            }, 100);

            // Jalankan hujan hati rontok
            setInterval(createHeart, 450);
        }

        // Fungsi Efek Mengetik Otomatis
        function typeWriter() {
            if (index < messageText.length) {
                if (messageText.charAt(index) === '\n') {
                    textContainer.innerHTML += '<br>';
                } else {
                    textContainer.innerHTML += messageText.charAt(index);
                }
                index++;
                setTimeout(typeWriter, 45); // Kecepatan ketikan per karakter
            }
        }

        // Fungsi Membikin Kelopak Hati Berguguran
        function createHeart() {
            const heartIcons = ['💖', '❤️', '✨', '💕'];
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's'; 
            heart.style.fontSize = Math.random() * 10 + 10 + 'px';
            
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }

        // Fungsi Pindah Halaman Akhir (I LOVE YOU)
        function showFinal() {
            const finalScreen = document.getElementById('final-screen');
            finalScreen.style.display = 'flex';
            setTimeout(() => {
                finalScreen.style.opacity = '1';
            }, 50);
        }
    </script>
</body>
</html>
